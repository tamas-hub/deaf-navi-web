name: Curate & Build

on:
  schedule:
    # 毎時0分に実行（UTC）→ JST毎時
    - cron: '0 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/curate.yml'

permissions:
  contents: write
  issues: write

concurrency:
  group: curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Curate (fetch RSS & write articles.json)
        run: npm run curate

      - name: Build static site
        run: npm run build

      - name: Commit & push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/articles.json docs/index.html docs/styles.css docs/app.js docs/sitemap.xml docs/robots.txt docs/feed.xml docs/og-image.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(curate): update articles $(date -u +'%Y-%m-%dT%H:%MZ')"
          # リモートが進んでいた場合に備えてリトライ付きpush
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed (attempt $attempt). Rebasing onto latest main..."
            git pull --rebase origin main || true
          done
          echo "Push failed after 3 attempts."
          exit 1

  notify-on-failure:
    needs: curate
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Curation failed: ${new Date().toISOString()}`;
            const body = `キュレーションActionsが失敗しました。ログを確認してください。\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['curation-failure']
            });